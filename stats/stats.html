<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadTrack — Stats</title>
    <link rel="stylesheet" href="stats.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <img src="../assets/icons/icon32.png" alt="ReadTrack" width="24" height="24" />
        <h1>Reading Stats</h1>
      </header>

      <!-- Overview -->
      <section class="card">
        <div class="card-header">
          <h2 id="range-heading">Last 7 days</h2>
          <select id="range-select">
            <option value="7" selected>7 days</option>
            <option value="10">10 days</option>
            <option value="14">14 days</option>
            <option value="21">21 days</option>
            <option value="30">30 days</option>
          </select>
        </div>
        <div class="week-summary">
          <span id="week-total-label">Total: —</span>
          <span id="week-avg-label">Daily avg: —</span>
        </div>
        <div class="bar-chart" id="weekly-chart"></div>
      </section>

      <!-- Category breakdown -->
      <section class="card">
        <h2 id="category-heading">Last 7 days by category</h2>
        <div id="category-breakdown"></div>
      </section>

      <!-- Per-domain list -->
      <section class="card">
        <h2 id="domain-heading">Last 7 days by site</h2>
        <ul id="domain-list"></ul>
      </section>
    </div>

    <script src="stats.js" type="module"></script>
  </body>
</html>
