<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadTrack — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <img src="../assets/icons/icon32.png" alt="ReadTrack" width="24" height="24" />
        <h1>ReadTrack Settings</h1>
      </header>

      <section class="card">
        <h2>Site Category Overrides</h2>
        <p class="description">
          Override the automatic category assigned to any domain.
        </p>

        <form id="override-form">
          <div class="input-row">
            <input
              type="text"
              id="override-domain"
              placeholder="e.g. example.com"
              autocomplete="off"
              spellcheck="false"
            />
            <select id="override-category">
              <option value="">Select category</option>
              <option value="Documentation">Documentation</option>
              <option value="Blogs">Blogs</option>
              <option value="News">News</option>
              <option value="Social Media">Social Media</option>
              <option value="Research">Research</option>
              <option value="eBooks">eBooks</option>
              <option value="Other">Other</option>
            </select>
            <button type="submit">Add</button>
          </div>
          <p class="error" id="form-error"></p>
        </form>

        <ul id="overrides-list"></ul>
      </section>
    </div>

    <script src="options.js" type="module"></script>
  </body>
</html>
